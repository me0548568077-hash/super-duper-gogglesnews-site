<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מבזקי פלטינום אולטרה 💎</title>
    <style>
        /* --- 1. הגדרות עיצוב ומשתנים --- */
        :root {
            --primary: #075e54;
            --secondary: #25d366;
            --bg: #e5ddd5;
            --text: #111b21;
            --card-bg: #ffffff;
            --shadow: 0 2px 5px rgba(0,0,0,0.1);
            --header-txt: #ffffff;
        }

        .dark-mode {
            --primary: #202c33;
            --secondary: #00a884;
            --bg: #111b21;
            --text: #e9edef;
            --card-bg: #202c33;
            --shadow: 0 1px 3px rgba(0,0,0,0.4);
        }

        /* --- 2. עיצוב כללי --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 80px;
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        /* --- 3. כותרת עליונה --- */
        header {
            background-color: var(--primary);
            color: var(--header-txt);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 2000;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        .logo { font-size: 1.4rem; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .status-indicator { width: 12px; height: 12px; border-radius: 50%; background: #888; display: inline-block; border: 2px solid #fff; }

        /* --- 4. שורת מבזקים רצים --- */
        .news-ticker {
            background: #333;
            color: #25d366;
            padding: 5px 0;
            margin-top: 55px;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            box-shadow: inset 0 0 10px #000;
        }
        .ticker-content { display: inline-block; animation: ticker 30s linear infinite; padding-left: 100%; }
        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(100%, 0); } }

        /* --- 5. חיפוש וכלים --- */
        .search-container {
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        #searchInput {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            box-shadow: var(--shadow);
            outline: none;
            font-size: 1rem;
        }

        /* --- 6. כרטיסיות חדשות --- */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 10px;
        }
        .news-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            border-right: 6px solid var(--secondary);
            position: relative;
            animation: slideUp 0.4s ease-out;
            transition: transform 0.2s;
        }
        .news-card:hover { transform: scale(1.02); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.85rem; color: #888; }
        .card-title { font-size: 1.2rem; font-weight: bold; text-decoration: none; color: inherit; line-height: 1.4; display: block; margin-bottom: 10px; }
        .card-desc { font-size: 1rem; opacity: 0.9; line-height: 1.6; }
        
        .share-btn {
            background: #25d366;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- 7. תפריט תחתון צף --- */
        nav.bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--primary);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 2000;
        }
        .nav-btn { color: white; background: none; border: none; font-size: 1.4rem; cursor: pointer; transition: 0.2s; }
        .nav-btn:active { transform: scale(0.8); }

        /* --- 8. מסך טעינה --- */
        #loader { text-align: center; padding: 50px; display: none; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); border-top: 4px solid var(--secondary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .large-text .card-title { font-size: 1.5rem; }
        .large-text .card-desc { font-size: 1.2rem; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div id="status-dot" class="status-indicator"></div>
        <span>מבזקי LIVE 💎</span>
    </div>
    <div style="display: flex; gap: 15px;">
        <button class="nav-btn" onclick="fetchNews()" title="רענון">🔄</button>
        <button class="nav-btn" onclick="toggleDark()" title="מצב לילה">🌙</button>
    </div>
</header>

<div class="news-ticker">
    <div class="ticker-content" id="tickerText">טוען מבזקים אחרונים מכל רחבי הרשת... • מערכת פלטינום 💎 • עדכונים שוטפים 24/6 • </div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="חפש במבזקים..." onkeyup="filterNews()">
</div>

<div id="loader"><div class="spinner"></div><p>מתחבר ללוויין...</p></div>

<div class="container" id="newsFeed">
    <div class="news-card">אנא המתן, המערכת מתחברת למקור החדשות...</div>
</div>

<nav class="bottom-nav">
    <button class="nav-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">🏠</button>
    <button class="nav-btn" onclick="toggleSize()">🅰️</button>
    <button class="nav-btn" onclick="showStats()">📊</button>
    <button class="nav-btn" onclick="shareApp()">📤</button>
</nav>

<script>
    /* --- הגדרות ה-API והחסינות --- */
    const RSS_URL = 'https://www.jdn.co.il/feed/';
    const API_KEY = 'oydf7vxtf8y0ykfbt0bc6qy8scf7pk6f6qyf5c7j'; // מפתח מיוחד לעקיפת חסימות
    const FINAL_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}&api_key=${API_KEY}`;

    let allNews = [];

    // פונקציית הבאת החדשות
    async function fetchNews() {
        const feed = document.getElementById('newsFeed');
        const loader = document.getElementById('loader');
        const dot = document.getElementById('status-dot');
        
        loader.style.display = 'block';
        dot.style.background = "orange";

        try {
            const response = await fetch(FINAL_URL);
            const data = await response.json();

            if (data.status === 'ok') {
                allNews = data.items;
                renderNews(allNews);
                updateTicker(allNews[0].title);
                dot.style.background = "#25d366"; // ירוק - הצלחה
            } else {
                throw new Error("API Error");
            }
        } catch (e) {
            dot.style.background = "red"; // אדום - שגיאה
            feed.innerHTML = '<div class="news-card">⚠️ חסימת רשת זוהתה. נסה ללחוץ על רענון (🔄) עוד כמה רגעים.</div>';
        } finally {
            loader.style.display = 'none';
        }
    }

    // פונקציית ציור החדשות על המסך
    function renderNews(newsItems) {
        const feed = document.getElementById('newsFeed');
        feed.innerHTML = '';

        if (newsItems.length === 0) {
            feed.innerHTML = '<div class="news-card">לא נמצאו תוצאות לחיפוש שלך.</div>';
            return;
        }

        newsItems.forEach((item, index) => {
            const date = new Date(item.pubDate);
            const timeStr = date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
            const dateStr = date.toLocaleDateString('he-IL');

            const cleanDesc = item.description.replace(/<[^>]*>?/gm, '').substring(0, 150);

            const card = document.createElement('div');
            card.className = 'news-card';
            card.style.animationDelay = (index * 0.05) + 's';

            card.innerHTML = `
                <div class="card-header">
                    <span>${dateStr}</span>
                    <span>${timeStr}</span>
                </div>
                <a href="${item.link}" target="_blank" class="card-title">${item.title}</a>
                <div class="card-desc">${cleanDesc}...</div>
                <button class="share-btn" onclick="shareNews('${item.title}', '${item.link}')">
                    שתף ידיעה 📱
                </button>
            `;
            feed.appendChild(card);
        });
    }

    // פיצ'ר: חיפוש בזמן אמת
    function filterNews() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allNews.filter(n => n.title.toLowerCase().includes(query) || n.description.toLowerCase().includes(query));
        renderNews(filtered);
    }

    // פיצ'ר: מצב לילה
    function toggleDark() {
        document.body.classList.toggle('dark-mode');
    }

    // פיצ'ר: הגדלת טקסט
    function toggleSize() {
        document.body.classList.toggle('large-text');
    }

    // פיצ'ר: שיתוף וואטסאפ
    function shareNews(title, url) {
        const text = encodeURIComponent(`*${title}*\nלכתבה המלאה:\n${url}`);
        window.open(`https://wa.me/?text=${text}`);
    }

    // פיצ'ר: סטטיסטיקה
    function showStats() {
        alert(`📊 נתוני מערכת:\n- סה"כ מבזקים טעונים: ${allNews.length}\n- סטטוס שרת: פעיל (OK)\n- זמן עדכון אחרון: ${new Date().toLocaleTimeString()}`);
    }

    // פיצ'ר: עדכון שורת מבזק רץ
    function updateTicker(text) {
        document.getElementById('tickerText').innerText += " • מבזק אחרון: " + text + " • ";
    }

    // פיצ'ר: שיתוף האתר
    function shareApp() {
        if (navigator.share) {
            navigator.share({ title: 'מבזקי פלטינום', url: window.location.href });
        } else {
            alert("העתק את הכתובת למעלה ושלח לחברים!");
        }
    }

    // הפעלה ראשונית
    fetchNews();

    // רענון אוטומטי כל 4 דקות
    setInterval(fetchNews, 240000);
</script>

</body>
</html>
