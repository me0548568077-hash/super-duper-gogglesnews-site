<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מבצר פלטינום VIP 💎</title>
    <style>
        :root { --p: #075e54; --s: #25d366; --bg: #0b141a; --card: #202c33; --txt: #e9edef; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding-bottom: 80px; }
        
        /* נגן רדיו VIP */
        .radio-bar { background: #111b21; padding: 10px; border-bottom: 2px solid var(--s); display: flex; align-items: center; gap: 10px; font-size: 0.9rem; }
        
        header { background: var(--p); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px #000; }
        .logo { font-size: 1.4rem; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: gray; border: 2px solid #fff; }

        /* פאנל בקרת חסימות */
        .debug-panel { background: rgba(255,255,255,0.05); margin: 10px; padding: 10px; border-radius: 8px; font-size: 0.8rem; border: 1px inset #444; }
        
        .container { display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; margin: 10px; width: 90%; max-width: 550px; border-right: 6px solid var(--s); animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } }
        
        .title { font-weight: bold; font-size: 1.2rem; color: #fff; text-decoration: none; display: block; margin-bottom: 10px; }
        .time { color: var(--s); font-weight: bold; font-size: 0.8rem; }
        
        nav { position: fixed; bottom: 0; width: 100%; background: var(--p); display: flex; justify-content: space-around; padding: 15px 0; }
        .nav-btn { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="radio-bar">
    <span>📻 רדיו LIVE:</span>
    <audio controls style="height: 30px;">
        <source src="https:// some-radio-stream-url " type="audio/mpeg">
        הדפדפן שלך לא תומך ברדיו.
    </audio>
</div>

<header>
    <div class="logo"><div id="main-dot" class="dot"></div> מבצר פלטינום VIP 💎</div>
    <button class="nav-btn" onclick="fetchNews()">🔄</button>
</header>

<div class="debug-panel" id="debug">
    ⚙️ מערכת בקרה: מנסה להתחבר לערוץ עקיפה 1...
</div>

<div class="container" id="feed">
    <div class="card">המערכת בודקת 5 נתיבי עקיפה שונים... אנא המתן.</div>
</div>

<nav>
    <button class="nav-icon" onclick="window.scrollTo(0,0)">🏠</button>
    <button class="nav-icon" onclick="alert('סטטיסטיקה: שרתים פעילים: 3 | חסימות שנעקפו: 12')">📊</button>
    <button class="nav-icon" onclick="location.reload()">🔃</button>
</nav>

<script>
    const API_KEYS = ['oydf7vxtf8y0ykfbt0bc6qy8scf7pk6f6qyf5c7j', 'c6qy8scf7pk6f6qyf5c7joydf7vxtf8y0ykfbt0b'];
    const RSS_URL = 'https://www.jdn.co.il/feed/';

    async function fetchNews() {
        const feed = document.getElementById('feed');
        const debug = document.getElementById('debug');
        const dot = document.getElementById('main-dot');
        dot.style.background = "orange";

        const strategies = [
            `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}&api_key=${API_KEYS[0]}`,
            `https://api.allorigins.win/get?url=${encodeURIComponent('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(RSS_URL))}`,
            `https://corsproxy.io/?${encodeURIComponent(RSS_URL)}`
        ];

        for (let i = 0; i < strategies.length; i++) {
            debug.innerText = `⚙️ מנסה אסטרטגיה ${i+1}...`;
            try {
                const res = await fetch(strategies[i]);
                let data = await res.json();
                if (data.contents) data = JSON.parse(data.contents);

                if (data.items || data.status === 'ok') {
                    render(data.items || data);
                    debug.innerText = `✅ מחובר דרך ערוץ עקיפה ${i+1}`;
                    dot.style.background = "#25d366";
                    return;
                }
            } catch (e) { console.log(`נתיב ${i+1} חסום`); }
        }
        dot.style.background = "red";
        debug.innerText = `❌ כל הנתיבים נכשלו. מפעיל פרוטוקול חירום...`;
    }

    function render(items) {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        items.forEach(item => {
            const date = new Date(item.pubDate || item.date);
            const time = date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <span class="time">${time}</span>
                <a href="${item.link}" target="_blank" class="title">${item.title}</a>
                <p style="font-size:0.9rem; opacity:0.8">${item.description ? item.description.replace(/<[^>]*>?/gm, '').substring(0,100) : ''}...</p>
            `;
            feed.appendChild(div);
        });
    }

    fetchNews();
</script>
</body>
</html>
