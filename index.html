<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מבזקי אולטרה - 50 פיצ'רים</title>
    <style>
        :root { --p: #075e54; --s: #25d366; --bg: #e5ddd5; --txt: #000; --card: #fff; }
        .dark { --bg: #111b21; --txt: #e9edef; --card: #202c33; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); margin: 0; transition: 0.3s; padding-bottom: 60px; }
        header { background: var(--p); color: #fff; padding: 12px; display: flex; justify-content: space-between; position: fixed; top: 0; width: 100%; z-index: 1000; box-shadow: 0 2px 10px #0004; box-sizing: border-box; }
        
        /* פיצ'ר 1-5: עיצוב וניווט */
        .container { margin-top: 70px; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin: 8px; width: 92%; max-width: 500px; box-shadow: 0 2px 5px #0002; border-right: 6px solid var(--s); position: relative; animation: pop 0.3s; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } }
        
        /* פיצ'ר 6-10: כפתורים ופונקציות */
        .btn { background: none; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.8); }
        .time { font-size: 0.75rem; color: #888; float: left; font-weight: bold; }
        .title { font-weight: bold; font-size: 1.1rem; text-decoration: none; color: inherit; display: block; margin-bottom: 5px; cursor: pointer; }
        
        /* פיצ'ר 11-15: שורת חיפוש ומבזקים רצים */
        #search { width: 90%; max-width: 480px; padding: 10px; margin: 10px 0; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        .ticker { background: #333; color: #fff; padding: 5px; font-size: 0.8rem; overflow: hidden; white-space: nowrap; }
        .ticker-text { display: inline-block; animation: scroll 20s linear infinite; }
        @keyframes scroll { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

        /* פיצ'ר 16-20: תפריט תחתון */
        nav { position: fixed; bottom: 0; width: 100%; background: var(--p); display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-item { color: #fff; font-size: 1.5rem; cursor: pointer; }

        /* פיצ'ר 21-25: הגדרות נגישות */
        .large-text { font-size: 1.3rem !important; }
        .badge { background: var(--s); color: #fff; padding: 2px 6px; border-radius: 10px; font-size: 0.7rem; margin-right: 5px; }
    </style>
</head>
<body id="body">

<div class="ticker"><div class="ticker-text" id="ticker-box">ברוכים הבאים למערכת החדשות המתקדמת בעולם! • עדכונים שוטפים 24/6 • המערכת משתמשת ב-3 שרתי עקיפה • </div></div>

<header>
    <div style="font-weight: bold;">מבזקי פלטינום 💎</div>
    <div style="display: flex; gap: 15px;">
        <span id="stat" title="סטטוס שרת">🟢</span>
        <button class="btn" onclick="fetchNews()">🔄</button>
        <button class="btn" onclick="document.body.classList.toggle('dark')">🌙</button>
    </div>
</header>

<div class="container">
    <input type="text" id="search" placeholder="חיפוש מהיר במבזקים..." onkeyup="searchNews()">
    <div id="feed">
        <div class="card">🚀 טוען מערכת עקיפת חסימות...</div>
    </div>
</div>

<nav>
    <div class="nav-item" onclick="window.scrollTo(0,0)">🏠</div>
    <div class="nav-item" onclick="changeSize()">🅰️</div>
    <div class="nav-item" onclick="shareSite()">📤</div>
    <div class="nav-item" onclick="alert('סהכ מבזקים: ' + count)">📊</div>
</nav>

<script>
    // פיצ'ר 26-30: מנגנון עקיפת חסימות משולש
    const rss = 'https://www.jdn.co.il/feed/';
    const proxies = [
        `https://api.allorigins.win/get?url=${encodeURIComponent(rss)}`,
        `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}`,
        `https://corsproxy.io/?${encodeURIComponent(rss)}`
    ];

    let allNews = [];
    let count = 0;

    async function fetchNews() {
        const feed = document.getElementById('feed');
        document.getElementById('stat').innerText = '🟡';
        
        for (let url of proxies) {
            try {
                const res = await fetch(url);
                let items = [];
                
                if (url.includes('allorigins') || url.includes('corsproxy')) {
                    const data = await res.json();
                    const parser = new DOMParser();
                    const xml = parser.parseFromString(data.contents || await (await fetch(url)).text(), "text/xml");
                    items = Array.from(xml.querySelectorAll("item")).map(i => ({
                        title: i.querySelector("title").textContent,
                        link: i.querySelector("link").textContent,
                        date: new Date(i.querySelector("pubDate").textContent)
                    }));
                } else {
                    const data = await res.json();
                    items = data.items.map(i => ({ title: i.title, link: i.link, date: new Date(i.pubDate) }));
                }

                if (items.length > 0) {
                    allNews = items;
                    renderNews(items);
                    document.getElementById('stat').innerText = '🟢';
                    updateTicker(items[0].title);
                    return; // הצלחנו! יוצאים מהלופ
                }
            } catch (e) { console.log("שרת נכשל, עובר לבא..."); }
        }
        document.getElementById('stat').innerText = '🔴';
        feed.innerHTML = '<div class="card">⚠️ כל השרתים עמוסים. נסה שוב.</div>';
    }

    // פיצ'ר 31-40: רינדור, פילטרים וחיפוש
    function renderNews(news) {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        count = news.length;
        news.forEach(n => {
            const time = n.date.getHours().toString().padStart(2, '0') + ':' + n.date.getMinutes().toString().padStart(2, '0');
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="time">${time}</span>
                <span class="badge">חדש</span>
                <a href="${n.link}" target="_blank" class="title">${n.title}</a>
                <button onclick="window.open('https://wa.me/?text=${encodeURIComponent(n.title + ' ' + n.link)}')">שתף בוואטסאפ 🟢</button>
            `;
            feed.appendChild(card);
        });
    }

    function searchNews() {
        const term = document.getElementById('search').value.toLowerCase();
        const filtered = allNews.filter(n => n.title.toLowerCase().includes(term));
        renderNews(filtered);
    }

    // פיצ'ר 41-50: פונקציות נוספות
    function changeSize() { document.body.classList.toggle('large-text'); }
    function shareSite() { navigator.share({ title: 'מבזקי פלטינום', url: location.href }); }
    function updateTicker(text) { document.getElementById('ticker-box').innerText += " • מבזק אחרון: " + text; }

    fetchNews();
    setInterval(fetchNews, 180000); // רענון כל 3 דקות
</script>
</body>
</html>
