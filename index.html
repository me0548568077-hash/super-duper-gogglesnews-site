<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTUM MEMORY: DYNAMIC GRID</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff007f; --bg: #050505; --gold: #ffd700; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: -1; }
        
        #timer-bar-container { width: 100%; height: 6px; background: #111; position: relative; display: none; overflow: hidden; }
        #timer-bar { height: 100%; background: var(--neon); width: 100%; transition: width 0.1s linear; }
        .panic { background: var(--pink) !important; box-shadow: 0 0 20px var(--pink); }

        #hud { padding: 10px 20px; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .stat-value { font-size: 22px; font-weight: bold; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .power-btn { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 6px 15px; border-radius: 8px; cursor: pointer; }
        
        #game-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 10px; overflow: hidden; position: relative; }
        
        /* המסגרת הדינמית שגדלה עם השלבים */
        #grid-frame {
            display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(0, 242, 255, 0.1); border-radius: 15px;
            transition: all 0.5s ease; padding: 10px; box-sizing: border-box;
        }

        #grid { display: grid; gap: 8px; justify-content: center; align-items: center; }
        
        .card { perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card.matched { animation: match-out 0.4s forwards; pointer-events: none; }
        @keyframes match-out { 0% { transform: scale(1.1); } 100% { transform: scale(0); opacity: 0; } }
        
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; border: 1px solid rgba(0, 242, 255, 0.3); }
        .card-front { background: linear-gradient(135deg, #1a1a1a, #000); box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.1); }
        .card-back { background: #222; transform: rotateY(180deg); border-color: var(--pink); display: flex; align-items: center; justify-content: center; }
        
        #win-overlay { position: absolute; inset: 0; display: none; justify-content: center; align-items: center; background: rgba(0,0,0,0.7); z-index: 50; pointer-events: none; }
        .win-text { font-size: 80px; color: var(--neon); font-weight: bold; text-shadow: 0 0 30px var(--neon); animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.1); opacity: 1; } }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        input { padding: 8px; background: #000; color: var(--neon); border: 1px solid var(--neon); border-radius: 5px; text-align: center; }
        button.main-btn { padding: 20px 60px; font-size: 28px; background: transparent; color: var(--neon); border: 3px solid var(--neon); border-radius: 60px; cursor: pointer; }
    </style>
</head>
<body>
<canvas id="canvas-bg"></canvas>
<div id="timer-bar-container"><div id="timer-bar"></div></div>

<div id="hud">
    <div class="stat-box"><div>שלב</div><div id="lvl-val" class="stat-value">1</div></div>
    <div id="powers">
        <button class="power-btn" onclick="useHint()">💡 רמז (<span id="hint-count">3</span>)</button>
        <button class="power-btn" onclick="useShuffle()">🌀 ערבוב (<span id="shuffle-count">3</span>)</button>
    </div>
    <div id="timer-display" style="display:none; text-align: center;"><div>זמן</div><div id="time-left" class="stat-value">0</div></div>
    <div class="stat-box"><div>זוגות</div><div id="pairs-val" class="stat-value">0</div></div>
</div>

<div id="game-container">
    <div id="win-overlay"><div class="win-text">SYSTEM UPDATED</div></div>
    <div id="grid-frame">
        <div id="grid"></div>
    </div>
</div>

<div id="start-modal" class="modal">
    <h1 style="color:var(--neon); font-size: 50px;">QUANTUM MEMORY</h1>
    <div style="margin: 15px;">שלב קפיצה: <input type="number" id="lvl-input" value="1" min="1"></div>
    <div style="margin: 15px;"><label><input type="checkbox" id="timer-toggle"> מצב טיימר (Hardcore)</label></div>
    <button class="main-btn" onclick="bootGame()">התחל משחק 🚀</button>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(f, t, d, v=0.1) {
        try {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
        } catch(e) {}
    }

    const grid = document.getElementById('grid'), canvas = document.getElementById('canvas-bg'), ctx = canvas.getContext('2d');
    const gridFrame = document.getElementById('grid-frame');
    let currentLevel = 1, totalPairs = 0, matchesFound = 0, flippedCards = [], isLock = false, hintsLeft = 3, shufflesLeft = 3;
    let timerActive = false, timeLeft = 0, timerInterval = null, initialTime = 60, particles = [];

    const emojiPool = ["🚀","🛸","👾","🤖","💎","🔥","⚡","🌀","🌈","👻","🎃","🦄","🦁","🐯","🦊","🐱","🐺","🐨","🐲","🌍","☀️","🌙","🍎","🍕","🍔","🍟","⚽","🏀","🎮","🎸","🎹","🎺","🎻","💰","🔑","🎁","🎈","🧿","🔭","🧪","🧬","🔋","🪐","🌑","🏹","🔮","🧱","⛓️","🛡️","⚔️","👑","💍","🎨","🎬","🎤","🎧","📻","📱","💻","🕯️","🛠️","⛏️","⚙️","🔫","🧨","💣","🧸","🪄","🔔","📡","⌛","🕰️","⛱️","🌋","🏜️","🏔️","🏘️","🏰","🎢","🚂","🚁","🛶","⚓","⛽","🚧","🚥","🚢","🛹","🚜","🚲","🛵"];

    function bootGame() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        currentLevel = parseInt(document.getElementById('lvl-input').value);
        timerActive = document.getElementById('timer-toggle').checked;
        document.getElementById('start-modal').style.display = 'none';
        if(timerActive) { 
            document.getElementById('timer-bar-container').style.display = 'block'; 
            document.getElementById('timer-display').style.display = 'block'; 
        }
        setInterval(() => { if(!isLock) playSound(110, 'sine', 2, 0.02); }, 2000);
        initLevel();
    }

    function initLevel() {
        grid.innerHTML = ''; flippedCards = []; matchesFound = 0; isLock = false;
        document.getElementById('win-overlay').style.display = 'none';
        clearInterval(timerInterval);
        
        let baseCards = 8 + (currentLevel * 4);
        let cols = Math.ceil(Math.sqrt(baseCards));
        let rows = Math.ceil(baseCards / cols);
        if ((cols * rows) % 2 !== 0) cols++; 
        
        let numCards = cols * rows;
        totalPairs = numCards / 2;

        let levelEmojis = [];
        let tempPool = [...emojiPool].sort(() => Math.random() - 0.5);
        for(let i=0; i<totalPairs; i++) levelEmojis.push(tempPool[i % tempPool.length]);
        
        let deck = [...levelEmojis, ...levelEmojis].sort(() => Math.random() - 0.5);
        deck.forEach(s => createCard(s));

        if(timerActive) { initialTime = Math.max(10, 60 - (currentLevel * 2)); startTimer(); }
        updateUI(); calculateGrid(cols, rows);
    }

    function calculateGrid(cols, rows) {
        // גודל המסגרת גדל עם השלבים (מ-40% ועד 98%)
        let growthFactor = Math.min(0.98, 0.4 + (currentLevel * 0.02));
        
        const maxW = window.innerWidth * growthFactor;
        const maxH = (window.innerHeight - 120) * growthFactor;
        
        gridFrame.style.width = maxW + "px";
        gridFrame.style.height = maxH + "px";

        let size = Math.min((maxW / cols) - 10, (maxH / rows / 1.3) - 10);
        
        // הגנה - שהקלפים לא יהיו קטנים מדי בטעות
        if(size < 30) size = 30; 

        grid.style.gridTemplateColumns = `repeat(${cols}, ${size}px)`;
        Array.from(grid.children).forEach(c => {
            c.style.width = size + 'px'; c.style.height = (size * 1.3) + 'px';
            const back = c.querySelector('.card-back');
            if(back) back.style.fontSize = (size * 0.6) + 'px';
        });
    }

    function createCard(s) {
        const c = document.createElement('div');
        c.className = 'card'; c.dataset.val = s;
        c.innerHTML = `<div class="card-inner"><div class="card-face card-front"></div><div class="card-face card-back">${s}</div></div>`;
        c.onclick = () => { playSound(600, 'sine', 0.1); handleFlip(c); };
        grid.appendChild(c);
    }

    function handleFlip(c) {
        if (isLock || c.classList.contains('flipped') || c.classList.contains('matched')) return;
        c.classList.add('flipped'); flippedCards.push(c);
        if (flippedCards.length === 2) { isLock = true; checkMatch(); }
    }

    function checkMatch() {
        const [c1, c2] = flippedCards;
        if (c1.dataset.val === c2.dataset.val) {
            matchesFound++; playSound(440, 'triangle', 0.5); spawnFX(c1);
            setTimeout(() => {
                c1.classList.add('matched'); c2.classList.add('matched');
                flippedCards = []; isLock = false; updateUI();
                if (matchesFound === totalPairs) { 
                    clearInterval(timerInterval);
                    document.getElementById('win-overlay').style.display = 'flex';
                    playSound(880, 'sine', 0.8, 0.2);
                    setTimeout(() => { currentLevel++; initLevel(); }, 1200); 
                }
            }, 400);
        } else {
            playSound(150, 'sawtooth', 0.3, 0.2);
            setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); flippedCards = []; isLock = false; }, 1000);
        }
    }

    function startTimer() {
        timeLeft = initialTime;
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            const bar = document.getElementById('timer-bar');
            bar.style.width = (timeLeft / initialTime * 100) + "%";
            if(timeLeft < 10) bar.classList.add('panic');
            document.getElementById('time-left').innerText = Math.ceil(timeLeft);
            if(timeLeft <= 0) { clearInterval(timerInterval); alert("GAME OVER"); location.reload(); }
        }, 100);
    }

    function updateUI() {
        document.getElementById('lvl-val').innerText = currentLevel;
        document.getElementById('pairs-val').innerText = totalPairs - matchesFound;
        document.getElementById('hint-count').innerText = hintsLeft;
        document.getElementById('shuffle-count').innerText = shufflesLeft;
    }

    function useHint() {
        if (hintsLeft <= 0 || isLock) return;
        hintsLeft--; isLock = true; updateUI();
        const u = Array.from(document.querySelectorAll('.card:not(.matched):not(.flipped)'));
        const c1 = u[0], c2 = u.find(c => c.dataset.val === c1.dataset.val && c !== c1);
        c1.classList.add('flipped'); if(c2) c2.classList.add('flipped');
        setTimeout(() => { c1.classList.remove('flipped'); if(c2) c2.classList.remove('flipped'); isLock = false; }, 1200);
    }

    function useShuffle() {
        if (shufflesLeft <= 0 || isLock) return;
        shufflesLeft--; updateUI();
        const a = Array.from(document.querySelectorAll('.card:not(.matched)'));
        const v = a.map(c => c.dataset.val).sort(() => Math.random() - 0.5);
        a.forEach((c, i) => { c.dataset.val = v[i]; c.querySelector('.card-back').innerText = v[i]; });
    }

    function spawnFX(el) {
        const r = el.getBoundingClientRect();
        for(let i=0; i<15; i++) particles.push({ x: r.left + r.width/2, y: r.top + r.height/2, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, a: 1 });
    }

    function render() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.fillStyle = 'rgba(5,5,5,0.3)'; ctx.fillRect(0,0,canvas.width,canvas.height);
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.a -= 0.02; ctx.globalAlpha = p.a; ctx.fillStyle = '#00f2ff';
            ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
            if(p.a <= 0) particles.splice(i,1);
        });
        requestAnimationFrame(render);
    }
    render();
    window.addEventListener('resize', () => {
        let cols = Math.ceil(Math.sqrt(grid.children.length));
        let rows = Math.ceil(grid.children.length / cols);
        calculateGrid(cols, rows);
    });
</script>
</body>
</html>
