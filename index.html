<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Platinum Real AI 🧠</title>
    <style>
        :root { --main: #00ffcc; --bg: #050a0f; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #075e54; padding: 15px; text-align: center; font-weight: bold; border-bottom: 2px solid var(--main); }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 10px; max-width: 80%; line-height: 1.4; }
        .user { align-self: flex-start; background: #1e293b; border-right: 3px solid var(--main); }
        .ai { align-self: flex-end; background: #2d3748; border-left: 3px solid #ffd700; white-space: pre-wrap; }
        .input-area { padding: 15px; background: #111b21; display: flex; gap: 10px; }
        input { flex-grow: 1; background: #000; border: 1px solid var(--main); color: white; padding: 12px; border-radius: 5px; outline: none; }
        button { background: var(--main); border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .loading { color: var(--main); font-size: 0.8rem; display: none; margin-bottom: 5px; }
    </style>
</head>
<body>

<header>Platinum AI - בינה מלאכותית אמיתית 🧠</header>

<div id="chat-box">
    <div class="msg ai">מחובר למנוע Mistral AI. שאל אותי כל דבר, אני אענה לך תשובה אמיתית ולא מוכנה מראש.</div>
</div>

<div class="input-area">
    <div id="status" class="loading">הבינה המלאכותית מנסחת תשובה...</div>
    <input type="text" id="user-input" placeholder="שאל שאלה חכמה..." onkeypress="if(event.key=='Enter') talk()">
    <button onclick="talk()">שלח</button>
</div>

<script>
    async function talk() {
        const input = document.getElementById('user-input');
        const box = document.getElementById('chat-box');
        const status = document.getElementById('status');
        const prompt = input.value.trim();
        
        if (!prompt) return;

        box.innerHTML += `<div class="msg user">${prompt}</div>`;
        input.value = '';
        box.scrollTop = box.scrollHeight;
        status.style.display = 'block';

        try {
            // חיבור למנוע בינה מלאכותית אמיתי (Hugging Face Free Inference)
            const response = await fetch("https://api-inference.huggingface.co/models/MistralAI/Mistral-7B-Instruct-v0.2", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: prompt })
            });

            const data = await response.json();
            
            // עיבוד התשובה מהבינה
            let aiResponse = "";
            if (data && data[0] && data[0].generated_text) {
                aiResponse = data[0].generated_text.replace(prompt, "").trim();
            } else {
                aiResponse = "אני קצת עמוסה כרגע, נסה לשאול שוב בעוד רגע.";
            }

            status.style.display = 'none';
            box.innerHTML += `<div class="msg ai"><b>AI:</b>\n${aiResponse}</div>`;
            box.scrollTop = box.scrollHeight;

        } catch (e) {
            status.style.display = 'none';
            box.innerHTML += `<div class="msg ai">שגיאה: השרת חסם את הבקשה. נסה שוב.</div>`;
        }
    }
</script>

</body>
</html>
